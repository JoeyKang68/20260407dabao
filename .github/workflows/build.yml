name: Build Kivy App
on: [push, pull_request]

jobs:
  build-android:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build with Buildozer
        run: |
          docker pull ghcr.io/kivy/buildozer:latest
          docker run --rm \
            -v "${{ github.workspace }}:/home/user/hostcwd" \
            -w /home/user/hostcwd \
            --entrypoint /bin/bash \
            ghcr.io/kivy/buildozer:latest \
            -lc "buildozer -v android debug"

      - name: Upload APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: package
          if-no-files-found: ignore
          path: |
            bin/*.apk
            .buildozer/android/platform/build-*/dists/*/build/outputs/**/*.apk

      - name: Upload Build Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          if-no-files-found: ignore
          path: |
            .buildozer/**/*.log
            *.log
